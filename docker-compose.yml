version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: dogivo_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: dogivo
      POSTGRES_PASSWORD: dogivo
      POSTGRES_DB: dogivo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: dogivo_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dogivo_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
